version: '3.8'

services:
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.3
    hostname: wazuh-manager
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    networks:
      - blueforge-net

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.3
    hostname: wazuh-indexer
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
    networks:
      - blueforge-net

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    hostname: wazuh-dashboard
    ports:
      - "443:443"
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    networks:
      - blueforge-net

networks:
  blueforge-net:
    driver: bridge