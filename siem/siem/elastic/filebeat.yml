filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /logs/events.json
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      scenario: "sc-001-ransomware"
      platform: "blueforge"
    fields_under_root: true

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "blueforge-logs-%{+yyyy.MM}"

setup.kibana:
  host: "kibana:5601"

setup.ilm.enabled: false
setup.template.name: "blueforge"
setup.template.pattern: "blueforge-*"

logging.level: info